name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android Licenses
      run: |
        mkdir -p "$ANDROID_HOME/licenses"
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_HOME/licenses/android-sdk-license"
        echo "84831b9409646a918e30573bab4c9c91346d8abd" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "504667f4c0de7af1536de33381a6f4f440654048" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "6010856824d061f58336a7515ba6a213363abb7f" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "8933bad161af4178b1185d1a37fbf302f83f6101" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "743ff9092385c0d2d78f989d5e75b8385bfca8ad" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "859f317696f67ef3d7f30a50a5560e7804e37dd8" >> "$ANDROID_HOME/licenses/android-sdk-license"

    - name: Install required SDK components
      run: |
        sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        sdkmanager --list

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Build Release APK (Unsigned)
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 7
