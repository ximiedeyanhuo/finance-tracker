workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      java: 17
      android: true
      groups:
        - android
    
    trigger:
      push:
        branches:
          - main
          - master
    
    working_directory: /home/builder/code
    
    scripts:
      - name: Set Gradle wrapper permissions
        script: |
          chmod +x gradlew
      
      - name: Set Gradle options
        script: |
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3072m"
      
      - name: Build Debug APK
        script: |
          ./gradlew clean assembleDebug --no-daemon --stacktrace
    
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/android-sdk
